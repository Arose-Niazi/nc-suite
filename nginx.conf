server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # Tool subfolders
    location /decomposition/ {
        alias /usr/share/nginx/html/decomposition/;
        try_files $uri $uri/ /decomposition/index.html;
    }

    location /roots/ {
        alias /usr/share/nginx/html/roots/;
        try_files $uri $uri/ /roots/index.html;
    }

    location /euler/ {
        alias /usr/share/nginx/html/euler/;
        try_files $uri $uri/ /euler/index.html;
    }

    # Static assets cache
    location ~* \.(css|js|json|xml|txt|svg|ico|png)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
