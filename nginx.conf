server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / { try_files /index.html =404; }

    location /decomposition/ { alias /usr/share/nginx/html/decomposition/; try_files $uri $uri/ /decomposition/index.html; }
    location /roots/ { alias /usr/share/nginx/html/roots/; try_files $uri $uri/ /roots/index.html; }
    location /euler/ { alias /usr/share/nginx/html/euler/; try_files $uri $uri/ /euler/index.html; }
    location /iterative/ { alias /usr/share/nginx/html/iterative/; try_files $uri $uri/ /iterative/index.html; }
    location /interpolation/ { alias /usr/share/nginx/html/interpolation/; try_files $uri $uri/ /interpolation/index.html; }
    location /integration/ { alias /usr/share/nginx/html/integration/; try_files $uri $uri/ /integration/index.html; }
    location /differentiation/ { alias /usr/share/nginx/html/differentiation/; try_files $uri $uri/ /differentiation/index.html; }

    location ~* \.(css|js|json|xml|txt|svg|ico|png)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
